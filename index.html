const CATEGORIES = [
  { name: "Languages", items: ["Node.js","Python","Go","Rust","Java","C#","Ruby","PHP","Swift","Kotlin"] },
  { name: "Frameworks", items: ["React / Next.js","Vue / Nuxt","Angular","Django","Flask","Rails","Spring",".NET"] },
  { name: "IDEs", items: ["VS Code","JetBrains","Vim","Emacs","Sublime"] },
  { name: "OS", items: ["macOS","Windows","Linux"] },
  { name: "Extras", items: ["Docker","Terraform","env files","Logs","Coverage"] }
];

const PRESETS = {
  webapp: ["Node.js", "React / Next.js", "VS Code", "macOS", "env files", "Coverage"],
  pythonml: ["Python", "VS Code", "JetBrains", "macOS", "Linux", "env files", "Coverage", "Logs"],
  fullstack: ["Node.js", "Python", "React / Next.js", "Docker", "VS Code", "macOS", "Linux", "env files", "Coverage", "Logs"]
};

// State
const selected = new Set();

// Render categories
function renderCategories() {
  const container = document.getElementById("categories");
  container.innerHTML = CATEGORIES.map(cat => `
    <div class="category">
      <div class="category-title">${cat.name} <span class="count">${cat.items.length}</span></div>
      <div class="chips">
        ${cat.items.map(item => `<button class="chip" data-tech="${item}">${item}</button>`).join("")}
      </div>
    </div>
  `).join("");

  container.addEventListener("click", e => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    const tech = chip.dataset.tech;
    if (selected.has(tech)) { selected.delete(tech); chip.classList.remove("active"); }
    else { selected.add(tech); chip.classList.add("active"); }
    generate();
  });
}

// Generate .gitignore
function generate() {
  const preview = document.getElementById("preview");
  if (selected.size === 0) {
    preview.innerHTML = '<span class="empty">Select technologies to generate .gitignore</span>';
    document.getElementById("ruleCount").textContent = "0 rules";
    document.getElementById("lineCount").textContent = "0 lines";
    return;
  }

  const sections = [];
  const seenRules = new Set();
  let ruleCount = 0;

  for (const tech of selected) {
    const rules = RULES[tech];
    if (!rules) continue;
    const uniqueRules = [];
    for (const rule of rules) {
      if (!seenRules.has(rule)) {
        seenRules.add(rule);
        uniqueRules.push(rule);
        ruleCount++;
      }
    }
    if (uniqueRules.length > 0) {
      sections.push({ name: tech, rules: uniqueRules });
    }
  }

  const header = "# Generated by gitignore-gen\n# https://yurukusa.github.io/gitignore-gen/\n# " + [...selected].join(", ") + "\n";
  const body = sections.map(s =>
    `\n# ${s.name}\n` + s.rules.join("\n")
  ).join("\n");

  const output = header + body + "\n";
  const lines = output.split("\n").length;

  // Render with syntax highlighting for comments
  const highlighted = output.split("\n").map(line =>
    line.startsWith("#") ? `<span class="comment">${escapeHtml(line)}</span>` : escapeHtml(line)
  ).join("\n");

  preview.innerHTML = highlighted;
  document.getElementById("ruleCount").textContent = `${ruleCount} rules`;
  document.getElementById("lineCount").textContent = `${lines} lines`;
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function getOutput() {
  if (selected.size === 0) return "";
  const seenRules = new Set();
  const sections = [];
  for (const tech of selected) {
    const rules = RULES[tech];
    if (!rules) continue;
    const uniqueRules = rules.filter(r => { if (seenRules.has(r)) return false; seenRules.add(r); return true; });
    if (uniqueRules.length > 0) sections.push({ name: tech, rules: uniqueRules });
  }
  const header = "# Generated by gitignore-gen\n# https://yurukusa.github.io/gitignore-gen/\n# " + [...selected].join(", ") + "\n";
  return header + sections.map(s => `\n# ${s.name}\n` + s.rules.join("\n")).join("\n") + "\n";
}

// Copy
document.getElementById("copyBtn").addEventListener("click", () => {
  const text = getOutput();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    showToast("Copied to clipboard!");
    const btn = document.getElementById("copyBtn");
    btn.classList.add("copied");
    setTimeout(() => btn.classList.remove("copied"), 1500);
  });
});

// Download
document.getElementById("downloadBtn").addEventListener("click", () => {
  const text = getOutput();
  if (!text) return;
  const blob = new Blob([text], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = ".gitignore";
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("Downloaded .gitignore");
});

// Toast
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// Search
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll(".chip").forEach(chip => {
    chip.classList.toggle("hidden", q && !chip.dataset.tech.toLowerCase().includes(q));
  });
  document.querySelectorAll(".category").forEach(cat => {
    const visible = cat.querySelectorAll(".chip:not(.hidden)").length;
    cat.style.display = visible === 0 && q ? "none" : "";
  });
});

// Presets
document.querySelectorAll(".preset-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    selected.clear();
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    const items = PRESETS[btn.dataset.preset];
    items.forEach(tech => {
      selected.add(tech);
      const chip = document.querySelector(`.chip[data-tech="${tech}"]`);
      if (chip) chip.classList.add("active");
    });
    generate();
  });
});

// Clear
document.getElementById("clearAll").addEventListener("click", () => {
  selected.clear();
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  generate();
});

// Init
renderCategories();
</script>
</body>
</html>
