<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}

h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.search-section{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.search-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.search-row input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#0d0d0d;color:#ddd;font-size:0.9rem;outline:none}

.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:5px 12px;border-radius:6px;border:1px solid #333;background:#0d0d0d;color:#888;font-size:0.75rem;cursor:pointer;font-weight:600}
.filter-btn.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.filter-btn:hover:not(.active){color:#ccc}

.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;max-height:300px;overflow-y:auto;padding:4px}
.template-chip{padding:8px 12px;border-radius:8px;border:1px solid #333;background:#0d0d0d;color:#888;font-size:0.78rem;cursor:pointer;text-align:center;transition:all 0.15s}

.selected-section{margin-bottom:16px}

.selected-tag{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;background:#1a2744;color:#4da6ff;font-size:0.78rem;font-weight:600;border:1px solid #2a4a7a}
.selected-tag .remove{cursor:pointer;color:#60a5fa;font-weight:700;margin-left:2px}
.selected-tag .remove:hover{color:#f87171}
.empty-hint{color:#555;font-size:0.82rem}

.btn-row{display:flex;gap:8px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}

.output-section{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px;display:none}
.output-section.visible{display:block}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.output-header h3{font-size:0.9rem;color:#ccc}
.output-stats{font-size:0.78rem;color:#888}
textarea.output{width:100%;height:400px;padding:12px;border-radius:10px;border:1px solid #333;background:#0d0d0d;color:#ddd;font-family:'Fira Code',monospace;font-size:0.78rem;resize:vertical;outline:none;line-height:1.4}
textarea.output:focus{border-color:#3b82f6}

.custom-section{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.custom-section h3{font-size:0.9rem;color:#ccc;margin-bottom:8px}
textarea.custom{width:100%;height:100px;padding:12px;border-radius:10px;border:1px solid #333;background:#0d0d0d;color:#ddd;font-family:'Fira Code',monospace;font-size:0.78rem;resize:vertical;outline:none;line-height:1.4}
textarea.custom:focus{border-color:#3b82f6}

.status{text-align:center;font-size:0.82rem;margin:10px 0}
.status.loading{color:#f59e0b}
.status.error{color:#ef4444}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

footer{text-align:center;padding:32px 16px;border-top:1px solid #1a1a1a;margin-top:40px;color:#555;font-size:0.78rem}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
.related a{color:#4da6ff;text-decoration:none;margin:0 8px}

<body>
<div class="container">
<h1>gitignore Gen</h1>
<p class="subtitle">Generate .gitignore files from 150+ GitHub templates.</p>

<div class="search-section">
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search templates... (Node, Python, Rust, JetBrains, etc.)" oninput="filterTemplates()">
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div class="template-grid" id="templateGrid"></div>
</div>

<div class="selected-section">
  <div style="font-size:0.82rem;color:#888;margin-bottom:6px;font-weight:600">Selected templates:</div>
  <div class="selected-tags" id="selectedTags">
    <span class="empty-hint">Click templates above to add them</span>
  </div>
</div>

<div class="custom-section">
  <h3>Custom rules (optional)</h3>
  <textarea class="custom" id="customRules" placeholder="# Add your own rules here
.env
.env.local
*.log
dist/
build/"></textarea>
</div>

<div class="btn-row">
  <button class="btn primary" onclick="generate()">Generate .gitignore</button>
  <button class="btn" onclick="copyOutput()">Copy</button>
  <button class="btn" onclick="downloadOutput()">Download</button>
  <button class="btn" onclick="clearAll()">Clear</button>
</div>

<div id="status"></div>

<div class="output-section" id="outputSection">
  <div class="output-header">
    <h3>.gitignore</h3>
    <span class="output-stats" id="outputStats"></span>
  </div>
  <textarea class="output" id="outputArea" readonly></textarea>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/gitignore-gen">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
  <div class="related" style="margin-top:12px">
    <strong style="color:#888">Related Tools</strong><br>
    <a href="https://yurukusa.github.io/git-cheatsheet/">Git Cheatsheet</a>
    <a href="https://yurukusa.github.io/robots-txt/">Robots.txt</a>
  </div>
  <div style="margin-top:12px"><a href="https://yurukusa.github.io/dev-toolkit/" style="color:#666">Dev Toolkit — 101 free tools</a></div>
</footer>

<script>
const CATEGORIES={
  'Languages':['Ada','Agda','Android','AppEngine','AppceleratorTitanium','ArchLinuxPackages','C','C++','CFWheels','CMake','CUDA','CakePHP','ChefCookbook','Clojure','CodeIgniter','CommonLisp','Composer','Concrete5','Coq','CraftCMS','D','DM','Dart','Delphi','Drupal','EPiServer','Eagle','Elisp','Elixir','Elm','Erlang','ExpressionEngine','ExtJs','Fancy','Finale','ForceDotCom','Fortran','FuelPHP','GWT','Go','Godot','Gradle','Grails','Haskell','IGDBNext','Idris','JBoss','Java','Jekyll','Joomla','Julia','KiCad','Kohana','Kotlin','LabVIEW','Laravel','Leiningen','LemonStand','Lilypond','Lithium','Lua','Magento','Maven','Mercury','MetaProgrammingSystem','Nanoc','Nim','Node','OCaml','ObjC','Opa','OpenCart','OracleForms','Packer','Perl','Perl6','Phalcon','PlayFramework','Plone','Prestashop','Processing','PureScript','Python','Qooxdoo','Qt','R','ROS','Racket','Rails','Raku','RhodesRhomobile','Ruby','Rust','SCons','Sass','Scala','Scheme','Scrivener','Sdcc','SeamGen','SketchUp','Smalltalk','Stella','SugarCRM','Swift','Symfony','SymphonyCMS','TeX','Terraform','Textpattern','TurboGears2','TwinCAT3','Typo3','Unity','UnrealEngine','VVVVV','VisualStudio','Waf','WordPress','Xojo','Yeoman','Yii','ZendFramework','Zephir'],
  'IDE/Editor':['Emacs','JetBrains','Kate','KDevelop4','NetBeans','SublimeText','TextMate','Vim','VisualStudioCode','Xcode'],
  'OS':['Linux','macOS','Windows'],
  'Other':['Backup','CVS','Diff','Dropbox','GPG','Images','LibreOffice','Patch','PuTTY','SVN','Tags','VirtualEnv','Vagrant']
};

let allTemplates=[];
let selected=new Set();
let templateCache={};
let activeFilter='all';

function init(){
  allTemplates=Object.values(CATEGORIES).flat().sort();
  renderFilters();
  renderTemplates(allTemplates);
}

function renderFilters(){
  let html='<span class="filter-btn'+(activeFilter==='all'?' active':'')+'" onclick="setFilter(\'all\')">All ('+allTemplates.length+')</span>';
  Object.keys(CATEGORIES).forEach(cat=>{
    html+=`<span class="filter-btn${activeFilter===cat?' active':''}" onclick="setFilter('${cat}')">${cat} (${CATEGORIES[cat].length})</span>`;
  });
  document.getElementById('filterRow').innerHTML=html;
}

function setFilter(f){
  activeFilter=f;
  renderFilters();
  filterTemplates();
}

function filterTemplates(){
  const query=document.getElementById('searchInput').value.toLowerCase();
  let pool=activeFilter==='all'?allTemplates:(CATEGORIES[activeFilter]||[]);
  if(query){
    pool=pool.filter(t=>t.toLowerCase().includes(query));
  }
  renderTemplates(pool);
}

function renderTemplates(list){
  document.getElementById('templateGrid').innerHTML=list.map(t=>
    `<div class="template-chip${selected.has(t)?' selected':''}" onclick="toggleTemplate('${t}')">${t}</div>`
  ).join('')||'<div style="color:#555;padding:12px">No templates match your search.</div>';
}

function toggleTemplate(name){
  if(selected.has(name)) selected.delete(name);
  else selected.add(name);
  filterTemplates();
  renderSelected();
}

function renderSelected(){
  const tags=document.getElementById('selectedTags');
  if(selected.size===0){
    tags.innerHTML='<span class="empty-hint">Click templates above to add them</span>';
  }else{
    tags.innerHTML=[...selected].map(t=>
      `<span class="selected-tag">${t}<span class="remove" onclick="event.stopPropagation();toggleTemplate('${t}')">×</span></span>`
    ).join('');
  }
}

async function fetchTemplate(name){
  if(templateCache[name]) return templateCache[name];
  const url=`https://raw.githubusercontent.com/github/gitignore/main/${name}.gitignore`;
  try{
    const resp=await fetch(url);
    if(!resp.ok){
      // Try Global/ subdirectory
      const resp2=await fetch(`https://raw.githubusercontent.com/github/gitignore/main/Global/${name}.gitignore`);
      if(!resp2.ok) return `# ${name} template not found\n`;
      const text=await resp2.text();
      templateCache[name]=text;
      return text;
    }
    const text=await resp.text();
    templateCache[name]=text;
    return text;
  }catch(e){
    return `# Failed to fetch ${name}: ${e.message}\n`;
  }
}

async function generate(){
  if(selected.size===0&&!document.getElementById('customRules').value.trim()){
    setStatus('Select at least one template or add custom rules','error');
    return;
  }

  setStatus('Fetching templates...','loading');

  const parts=[];
  parts.push('# Generated by gitignore Gen');
  parts.push('# https://yurukusa.github.io/gitignore-gen/');
  parts.push(`# Templates: ${[...selected].join(', ')||'(custom only)'}`);
  parts.push('');

  for(const name of [...selected].sort()){
    const content=await fetchTemplate(name);
    parts.push(`### ${name} ###`);
    parts.push(content.trim());
    parts.push('');
  }

  const custom=document.getElementById('customRules').value.trim();
  if(custom){
    parts.push('### Custom ###');
    parts.push(custom);
    parts.push('');
  }

  const output=parts.join('\n');
  const lines=output.split('\n').length;
  const rules=output.split('\n').filter(l=>l.trim()&&!l.startsWith('#')).length;

  document.getElementById('outputArea').value=output;
  document.getElementById('outputStats').textContent=`${lines} lines · ${rules} rules · ${selected.size} templates`;
  document.getElementById('outputSection').classList.add('visible');
  setStatus('');
}

function copyOutput(){
  const text=document.getElementById('outputArea').value;
  if(!text){setStatus('Generate first','error');return}
  navigator.clipboard.writeText(text);
  toast('Copied!');
}

function downloadOutput(){
  const text=document.getElementById('outputArea').value;
  if(!text){setStatus('Generate first','error');return}
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='.gitignore';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Downloaded!');
}

function clearAll(){
  selected.clear();
  document.getElementById('customRules').value='';
  document.getElementById('outputArea').value='';
  document.getElementById('outputSection').classList.remove('visible');
  document.getElementById('searchInput').value='';
  activeFilter='all';
  renderFilters();
  filterTemplates();
  renderSelected();
  setStatus('');
}

function setStatus(msg,type){
  const el=document.getElementById('status');
  el.textContent=msg;
  el.className='status'+(type?' '+type:'');
}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

init();
</script>
</body>
</html>
